name: Bot scraping ofertas

on:
  schedule:
    - cron: '0 7,13,19 * * *'   # 7:00, 13:00 y 19:00 hora UTC (9h, 15h, 21h España)
  workflow_dispatch:              # también se puede lanzar manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: bot/requirements.txt

      - name: Instalar dependencias
        run: pip install -r bot/requirements.txt

      - name: Ejecutar scraper
        run: python bot/scraper.py
        env:
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
